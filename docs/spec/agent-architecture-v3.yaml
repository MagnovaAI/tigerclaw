# ============================================================================
# 6. INFRASTRUCTURE — Cross-cutting, no verb
# ============================================================================
infrastructure:

  - id: clock
    slot: exclusive
    tier: 1
    vtable:
      - "now_ms(ctx) -> i64"
      - "monotonic_ms(ctx) -> i64"
      - "sleep_ms(ctx, ms) -> void"
    plugs: [clock-system, clock-fake-test]

  - id: meter
    slot: shared
    tier: 1
    role: "Passive accounting. Does NOT refuse. guardrail-budget-cap reads meter, enforces."
    vtable:
      - "reserve(ctx, kind, amount) -> ReservationId"
      - "refund(ctx, reservation_id, unused) -> void"
      - "consume(ctx, reservation_id) -> void"
      - "remaining(ctx, kind) -> u64"
    plugs: [meter-tokens, meter-dollars, meter-wall, meter-quota]

  - id: telemetry
    slot: shared
    tier: 1
    role: "Ops-facing. Distinct from attest (compliance)."
    vtable:
      - "span_start(ctx, name, attrs) -> SpanId"
      - "span_end(ctx, span_id, status) -> void"
      - "event(ctx, name, attrs) -> void"
      - "flush(ctx) -> void"
    plugs: [telemetry-stdout, telemetry-jsonl, telemetry-otel, telemetry-prometheus]

  - id: waiter
    slot: shared
    tier: 2
    role: "Resolves gate.defer tickets, sched-event triggers, any async wait"
    vtable:
      - "wait_timer(ctx, ms) -> void"
      - "wait_file(ctx, path, event_mask) -> FileEvent"
      - "wait_http_poll(ctx, url, matcher) -> HttpEvent"
      - "wait_human(ctx, ticket_id, deadline_ms) -> Decision"
      - "wait_event_bus(ctx, topic) -> BusEvent"
    plugs: [wait-timer, wait-file, wait-http-poll, wait-human, wait-event-bus]

# ============================================================================
# 7. COMPOSITIONS
# ============================================================================
compositions:

  - id: mvp-cli
    description: "Smallest agent: CLI only, local, one LLM"
    plugs:
      - clock-system
      - telemetry-stdout
      - audit-jsonl
      - persona-soul-md
      - guardrail-access-allowlist
      - guardrail-approval-cli
      - chan-cli
      - store-jsonl
      - infer-anthropic
      - super-boot
      - tool-bash
      - tool-read
      - tool-edit
      - tool-write

  - id: discord-always-on
    description: "Tiger on Discord, Omkar-only, auto-boot, budget-capped"
    extends: mvp-cli
    add_plugs:
      - chan-discord
      - store-sqlite
      - guardrail-budget-cap
      - guardrail-access-rate-limit
      - meter-tokens
      - meter-dollars
      - super-launchd
    config_overrides:
      guardrail-access-allowlist:
        allow_peers: ["discord:user:OMKAR_ID"]
        default: deny
        bootstrap_pair_exception: true
      meter-dollars:
        daily_cap_usd: 5.00
      chan-discord:
        reply_mode: "reply"
        listen_dms: ["discord:user:OMKAR_ID"]

  - id: autonomous-heartbeat
    description: "Proactive agent: wakes on schedule, uses sensors"
    extends: discord-always-on
    add_plugs:
      - sched-cron
      - sched-wakeup
      - sched-interval
      - chan-file-watch
      - wait-timer
      - wait-human
    config_overrides:
      autonomous_reply_channel: chan-discord

  - id: multi-agent-mesh
    description: "Delegates to peer agents locally and over network"
    extends: discord-always-on
    add_plugs:
      - chan-collab-inprocess
      - chan-collab-stdio
      - chan-collab-http-a2a
      - pair-bootstrap
      - audit-sig-chain
    note: "Multi-persona = run multiple composition instances, one persona each"

  - id: code-reviewer
    description: "Reads PR, calls tools, produces review"
    extends: mvp-cli
    add_plugs:
      - tool-grep
      - tool-git
      - tool-http
      - guardrail-approval-auto

# ============================================================================
# 8. EXTENSION POINTS
# ============================================================================
extension_points:

  - id: new-llm-provider
    how: "Add plug under text_inference"
    example: "infer-mistral, infer-groq"

  - id: new-channel
    how: "Add plug under channel; set direction + kind + capabilities"
    example: "chan-matrix, chan-signal, chan-webhook, chan-serial-in"

  - id: new-tool
    how: "Add plug under custom_tool; describe() returns schema"
    example: "tool-ssh, tool-docker-exec"

  - id: new-memory-backend
    how: "Add plug under session_store; pass contract tests incl. forget policies"
    example: "store-duckdb, store-redis"

  - id: new-guardrail-access-policy
    how: "Add plug under gate; declare phase(s)"
    example: "guardrail-content-dlp, guardrail-access-rate-limit, guardrail-content-pii-scrub"

  - id: new-sandbox
    how: "gate plug with phase=pre-act; shapes rather than denies"
    example: "guardrail-sandbox-bubblewrap, guardrail-sandbox-firejail, guardrail-sandbox-docker"

  - id: new-auditor
    how: "Add plug under auditor"
    example: "audit-kafka, audit-splunk"

  - id: new-pairing-method
    how: "Add plug under pairing"
    example: "pair-nfc, pair-bluetooth, pair-webauthn"

  - id: new-persona
    how: "Append to compositions:; no new code"
    example: "poet-agent, sre-agent"

  - id: new-hook-point
    how: "Add name to architecture.hook-bus.example_hooks"
    example: "before_act, after_gate_defer"

  - id: new-verb
    rule: |
      Requires ≥1 plugger, and that plugger must have ≥2 plug impls with
      orthogonal failure modes. Failure-mode orthogonality test:
      deleting plug A does not affect plug B's failure paths.
      If the candidate is just a persona or strategy — REJECT.

# ============================================================================
# 9. INVARIANTS
# ============================================================================
invariants:

  structural:
    - "Every plug references an existing plugger"
    - "Every verb references 1+ existing plugger"
    - "Every plugger is referenced by 1+ verb OR is infrastructure"
    - "Every composition's plugs exist"
    - "deprecated status implies replaced_by is set"
    - "MVP compositions (mvp-cli) use only tier=1 plugs"
    - "Every vtable fn has *const Context as first param"

  ownership:
    - "Only pairing plugger writes peer_store"
    - "guardrail-access-allowlist reads peer_store; never writes"
    - "Only gate plugs return Refused/OverBudget errors"
    - "meter only returns current state; never refuses"
    - "Only auditor writes audit_log; forget(purge) does NOT erase audit records"

  runtime:
    - "Every outbound converse envelope carries valid persona signature"
    - "Every custom_tool.invoke is preceded by gate.inspect(phase=pre-act)"
    - "Every text_inference.complete has meter.reserve called first; refund on error"
    - "Every channel message emits telemetry.span with channel.{in|out}"
    - "Every channel inbound+outbound+tool_call emits auditor.record"
    - "Every gate.defer resolves within deadline_ms OR on_deferred_resolved(deny(timeout))"
    - "gate(pre-reply) runs on COMPLETE message; streams get retract envelope on deny"
    - "Channels with !supports_retract MUST disable streaming"
    - "reply.origin_channel_id == sense.origin_channel_id for reactive turns"
    - "tool_loop iterations <= composition.max_tool_iterations (default 1000)"
    - "meter.reserve is called PER tool_loop iteration, not per turn"
    - "Supervisor restart backoff is exponential, capped at 60s"
    - "Scheduler wake within ±100ms of target on idle system"
    - "store-* plugs all pass the session_store contract suite"
    - "All collab-* channels perform vtable-handshake on first connection"

  slot_rules:
    exclusive: "Exactly 1 active plug per config"
    exclusive_with_fallback: "Ordered list; highest priority supports(ctx) wins; on error, next in chain"
    exclusive_per_channel: "1 per named channel (e.g., guardrail-approval-* per chan)"
    shared: "N>=0 active; semantics per-plugger: guardrails = any deny wins; telemetry = all emit; session_store = all write"

# ============================================================================
# END
# ============================================================================
