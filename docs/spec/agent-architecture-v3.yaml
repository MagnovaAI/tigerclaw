  # ── sandbox (process isolation; shapes the yes rather than denies) ────
  - { id: guardrail-sandbox-landlock,    plugger: guardrails, tier: 3, status: planned, phase: [pre-act], sub_family: sandbox }
  - { id: guardrail-sandbox-firejail,    plugger: guardrails, tier: 3, status: planned, phase: [pre-act], sub_family: sandbox }
  - { id: guardrail-sandbox-bubblewrap,  plugger: guardrails, tier: 3, status: planned, phase: [pre-act], sub_family: sandbox }
