  - { id: guardrail-personal-classifier-llm,    plugger: guardrails, tier: 3, status: planned, phase: [inbound, pre-act, pre-reply], sub_family: personal, note: "LLM-judge classifier; slower, more accurate" }
  - { id: guardrail-personal-grant-manager,     plugger: guardrails, tier: 1, status: planned, phase: [pre-act, pre-reply], stateful: true, sub_family: personal, note: "CRUD over ~/.tigerclaw/consent/grants/" }
  - { id: guardrail-personal-consent-cli,       plugger: guardrails, tier: 1, status: planned, phase: [pre-act], sub_family: personal, note: "Just-in-time prompt on CLI" }
  - { id: guardrail-personal-consent-discord,   plugger: guardrails, tier: 3, status: planned, phase: [pre-act], sub_family: personal }
  - { id: guardrail-personal-provider-tier,     plugger: guardrails, tier: 1, status: planned, phase: [pre-act], sub_family: personal, note: "Scope × provider-tier allow/deny matrix" }
  - { id: guardrail-personal-export-controls,   plugger: guardrails, tier: 2, status: planned, phase: [pre-reply], sub_family: personal }
  - { id: guardrail-personal-redactor,          plugger: guardrails, tier: 2, status: planned, phase: [pre-reply], sub_family: personal }

  # ── team (cross-member scope rules) ───────────────────────────────────
  - { id: guardrail-team-member-acl,     plugger: guardrails, tier: 3, status: planned, phase: [pre-act, pre-reply], stateful: true, sub_family: team }
  - { id: guardrail-team-scope-deny,     plugger: guardrails, tier: 3, status: planned, phase: [pre-reply], sub_family: team }
